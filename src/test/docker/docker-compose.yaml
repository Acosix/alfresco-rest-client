version: '3.8'

services:

    ${project.artifactId}-postgres:
        image: postgres:18.3
        networks:
          ${project.artifactId}-network:
            aliases:
              - postgres
        restart: unless-stopped
        command: postgres -c max_connections=300
        volumes:
          - ${project.artifactId}-alf_psql:/srv/postgresql
        environment:
          PGDATA: /srv/postgresql/data
          POSTGRES_DB: alfresco
          POSTGRES_USER: alfresco
          POSTGRES_PASSWORD: alfresco

    ${project.artifactId}-repository:
        image: ${project.artifactId}-repository:latest
        build:
            context: ./repository
            dockerfile: Dockerfile
        networks:
          ${project.artifactId}-network:
            aliases:
              - repository 
        restart: unless-stopped
        depends_on:
          ${project.artifactId}-postgres:
            condition: service_started
        volumes:
          - ${project.artifactId}-contentstore:${docker.tests.repository.dataPath}
          - ${project.artifactId}-repo_logs:${docker.tests.repository.tomcatPath}/logs
        ports:
          - ${docker.tests.repository.port}:8080
          - ${docker.tests.repository.debugPort}:8888
        environment:
            JAVA_OPTS: >-
              -Xms1536m -Xmx1536m -XX:+UseG1GC -XX:+ParallelRefProcEnabled
              -XX:+UseStringDeduplication -XX:+ScavengeBeforeFullGC
              -XX:+DisableExplicitGC -XX:+AlwaysPreTouch
              ${docker.tests.repository.versionSpecificJavaOpts}
              -Dfile.encoding=UTF-8
              -Djava.net.preferIPv4Stack=true
        healthcheck:
            test: curl -f localhost:8080/alfresco/
            interval: 15s
            timeout: 15s
            retries: 6

networks:
    ${project.artifactId}-network:

volumes:
    ${project.artifactId}-alf_psql:
    ${project.artifactId}-contentstore:
    ${project.artifactId}-repo_logs: